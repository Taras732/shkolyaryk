server {
    listen 80;
    server_name shkolyaryk.kuznya.studio;

    # Шлях до папки з побудованим веб-додатком (після npm run build або expo export)
    root /var/www/shkolyaryk/dist;
    index index.html;

    # Стиснення gzip для швидшого завантаження ігрових асетів
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA-маршрутизація: перенаправляти всі запити, які не є файлами, на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кешування статичних асетів (зображень, шрифтів, аудіо) для офлайн роботи PWA
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|mp3|ogg|wav)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # Не кешувати service worker та manifest, щоб користувачі миттєво бачили оновлення
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    location = /manifest.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }
}
